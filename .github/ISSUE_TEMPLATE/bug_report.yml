name: Bug report
description: Report a reproducible problem in workflow-core, dreamina-adapter, studio-api, or studio-web.
title: "[Bug]: "
labels:
  - bug
body:
  - type: dropdown
    id: scope
    attributes:
      label: Affected area
      description: Choose the main boundary impacted by this bug.
      options:
        - workflow-core
        - dreamina-adapter
        - studio-api
        - studio-web
        - docs / repository tooling
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: A short description of the bug and why it matters.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Tell us exactly how to reproduce the problem.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Click ...
        4. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened in practice?
    validations:
      required: true
  - type: textarea
    id: workflow
    attributes:
      label: Workflow or node context
      description: Include the workflow shape, node types, submit_id, or adapter context if relevant.
      render: shell
  - type: textarea
    id: logs
    attributes:
      label: Logs and screenshots
      description: Paste stack traces, API responses, screenshots, or terminal output.
      render: shell
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Node version, OS, browser, and Dreamina CLI version if relevant.
      placeholder: macOS 14, Node 20, Chrome 135, dreamina fa7ede2
